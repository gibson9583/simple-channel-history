# Builds the plugin against a downloaded OIE distribution on a semver tag, publishes
# a GitHub Release with the zip, then opens a community-catalog PR so the Community
# Store offers it.
#
#   git tag v2.7.1 && git push origin v2.7.1
#
# The tag drives the version stamped into the build (-Drevision → pom/${project.version},
# so plugin.xml pluginVersion + the library jar names) and webadmin/plugin.json; oie.json
# is verified to match the tag. Requires a CATALOG_TOKEN repo secret (fine-grained PAT
# with Contents + Pull requests read/write on the catalog repo).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # OIE distribution that supplies the engine jars this plugin builds against.
  OIE_TAG: v4.6.0-rc1
  OIE_TARBALL: oie_unix_4_6_0-rc1.tar.gz
  # Maven version the engine dependencies are declared with (pom.xml mc.version).
  MC_VERSION: '4.6.0'

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
      minengine: ${{ steps.pkg.outputs.minengine }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve and verify version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(jq -r .version oie.json)"; MANIFEST_VERSION="${MANIFEST_VERSION#v}"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version $VERSION but oie.json says $MANIFEST_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache OIE distribution
        id: oie-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OIE_TARBALL }}
          key: oie-dist-${{ env.OIE_TAG }}

      - name: Download OIE distribution (engine jars)
        if: steps.oie-cache.outputs.cache-hit != 'true'
        run: curl -fSL -o "$OIE_TARBALL" "https://github.com/OpenIntegrationEngine/engine/releases/download/${OIE_TAG}/${OIE_TARBALL}"

      - name: Install engine jars into the local Maven repo
        run: |
          tar xzf "$OIE_TARBALL"
          # groupId:artifactId:path-under-oie — the 12 jars this plugin's modules
          # depend on (scope provided). Installed at MC_VERSION to match pom.xml.
          JARS=(
            "com.mirth.connect:mirth-server:server-lib/mirth-server.jar"
            "com.mirth.connect:donkey-server:server-lib/donkey/donkey-server.jar"
            "com.mirth.connect:mirth-client-core:server-lib/mirth-client-core.jar"
            "com.mirth.connect:mirth-client:client-lib/mirth-client.jar"
            "com.mirth.connect.connectors:vm-shared:extensions/vm/vm-shared.jar"
            "com.mirth.connect.connectors:js-shared:extensions/js/js-shared.jar"
            "com.mirth.connect.connectors:tcp-shared:extensions/tcp/tcp-shared.jar"
            "com.mirth.connect.plugins:mllpmode-shared:extensions/mllpmode/mllpmode-shared.jar"
            "com.mirth.connect.plugins:http-shared:extensions/http/http-shared.jar"
            "com.mirth.connect.plugins:javascriptstep-shared:extensions/javascriptstep/javascriptstep-shared.jar"
            "com.mirth.connect.plugins.datatypes:datatype-raw-shared:extensions/datatype-raw/datatype-raw-shared.jar"
            "com.mirth.connect.plugins.datatypes:datatype-hl7v2-shared:extensions/datatype-hl7v2/datatype-hl7v2-shared.jar"
          )
          for entry in "${JARS[@]}"; do
            IFS=':' read -r group artifact rel <<< "$entry"
            jar="$GITHUB_WORKSPACE/oie/$rel"
            test -f "$jar" || { echo "::error::missing engine jar $rel in the OIE distribution"; exit 1; }
            mvn -B -ntp install:install-file -Dfile="$jar" -DgroupId="$group" \
              -DartifactId="$artifact" -Dversion="$MC_VERSION" -Dpackaging=jar
          done

      - name: Stamp version (webadmin manifest)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' webadmin/plugin.json > webadmin/plugin.json.tmp && mv webadmin/plugin.json.tmp webadmin/plugin.json

      - name: Build extension
        # -Drevision drives ${project.version}: plugin.xml pluginVersion, the library
        # jar names, and the zip name (simple-channel-history-<version>.zip). Signing
        # is skipped by default (no keystore in CI).
        run: mvn -B -ntp -DskipTests -Drevision="${{ steps.ver.outputs.version }}" package

      - name: Stage the release asset and checksum
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="$(find package/target -maxdepth 1 -name 'simple-channel-history-*.zip' | head -n1)"
          if [ -z "$SRC" ]; then
            echo "::error::No simple-channel-history zip found in package/target/"; ls -l package/target || true; exit 1
          fi
          ASSET="simple-channel-history-${VERSION}.zip"
          mkdir -p out
          cp "$SRC" "out/${ASSET}"
          ( cd out && sha256sum "${ASSET}" > "${ASSET}.sha256" )
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "out/${ASSET}.sha256")" >> "$GITHUB_OUTPUT"
          echo "minengine=$(jq -r '.minEngineVersion // "4.6.0"' oie.json)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ steps.pkg.outputs.asset }}
            out/${{ steps.pkg.outputs.asset }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Opens a PR against the community catalog with this release's manifest — catalog
  # CI digest-verifies before merge, and the index rebuild on merge makes connected
  # engines offer the update on their next sync.
  catalog-manifest:
    needs: release
    runs-on: ubuntu-latest
    env:
      CATALOG_REPO: gibson9583/oie-community-catalog
      PLUGIN_ID: simple-channel-history
      VERSION: ${{ needs.release.outputs.version }}
      SHA256: ${{ needs.release.outputs.sha256 }}
      MIN_ENGINE: ${{ needs.release.outputs.minengine }}
      GH_TOKEN: ${{ secrets.CATALOG_TOKEN }}
    steps:
      - name: Require the catalog token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CATALOG_TOKEN secret is not set — cannot open the catalog PR. Add a fine-grained PAT with Contents+Pull requests access to $CATALOG_REPO."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: gibson9583/oie-community-catalog
          token: ${{ secrets.CATALOG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write the package meta.json (from the plugin's oie.json)
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/v${VERSION}/oie.json" -o /tmp/oie.json
          node -e '
            const o = JSON.parse(require("fs").readFileSync("/tmp/oie.json","utf8"));
            const meta = {
              id: o.id, name: o.name, description: o.description, type: o.type,
              publisher: (o.authors && o.authors[0]) || o.id,
              repository: o.homepage, homepage: o.homepage, documentation: o.documentation,
              license: o.license, authors: o.authors || [], keywords: o.keywords || [],
              deprecated: !!o.deprecated
            };
            require("fs").writeFileSync(process.env.META_PATH, JSON.stringify(meta, null, 4) + "\n");
          '
        env:
          META_PATH: manifests/plugins/${{ env.PLUGIN_ID }}/meta.json

      - name: Write the version manifest
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          cat > "manifests/plugins/${PLUGIN_ID}/${VERSION}.json" <<EOF
          {
              "version": "${VERSION}",
              "minEngineVersion": "${MIN_ENGINE}",
              "maxEngineVersion": null,
              "installerUrl": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${PLUGIN_ID}-${VERSION}.zip",
              "sha256": "${SHA256}",
              "restartRequired": true,
              "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "releaseNotesUrl": "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
              "docsUrl": "https://raw.githubusercontent.com/${{ github.repository }}/v${VERSION}/docs/store.md"
          }
          EOF

      - name: Validate (schema + digest download)
        run: node scripts/build-index.mjs --lint --verify "manifests/plugins/${PLUGIN_ID}/${VERSION}.json"

      - name: Open the catalog PR
        run: |
          BRANCH="${PLUGIN_ID}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifests
          git commit -m "${PLUGIN_ID} ${VERSION}"
          git push -f origin "$BRANCH"
          if gh pr list -R "$CATALOG_REPO" --head "$BRANCH" --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for $BRANCH — branch updated."
          else
            gh pr create -R "$CATALOG_REPO" --head "$BRANCH" \
              --title "${PLUGIN_ID} ${VERSION}" \
              --body "Automated manifest for [${PLUGIN_ID} v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}). Digest verified against the release asset by catalog CI."
          fi
